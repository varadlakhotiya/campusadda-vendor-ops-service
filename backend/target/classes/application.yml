spring:
  application:
    name: campusadda-vendor-ops-service

  profiles:
    active: dev

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:sadvjbkcnjvfbvfldkgalkgndfabjvbjakengnfggrdsgfdgvffftgrtt}
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 604800000

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:5500
      - http://127.0.0.1:5500
      - http://localhost:5600
      - http://127.0.0.1:5600

  seed:
    default-admin:
      enabled: true
      full-name: Super Admin
      email: admin@campusadda.com
      phone: 9999999999
      password: Admin@

  kafka:
    topics:
      order-created: order-created
      order-status-updated: order-status-updated
      stock-updated: stock-updated
      low-stock-alert-created: low-stock-alert-created

  scheduler:
    outbox-publish-delay-ms: 15000
    daily-etl-cron: "0 5 0 * * *"

  ml:
    service-base-url: http://localhost:8001
    default-horizon-days: 7
    default-model-name: XGBOOST
    retrain-cron: "0 30 1 * * *"