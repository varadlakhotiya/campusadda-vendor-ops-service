<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Movements</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app-shell">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="topbar"><h2>Stock Movements</h2></div>

    <div class="section form-grid">
      <select id="vendorSelect"></select>
      <select id="inventoryItemSelect"></select>
    </div>

    <div class="section">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Delta</th>
            <th>Before</th>
            <th>After</th>
            <th>Reason</th>
            <th>Event Time</th>
          </tr>
        </thead>
        <tbody id="stockMovementsBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/guards.js"></script>
<script src="js/layout.js"></script>
<script src="js/stock-movements.js"></script>
</body>
</html>
