<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock Movements - Vendor Ops</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div>
          <div class="page-kicker">CampusAdda Vendor Ops</div>
          <h2>Stock Movements</h2>
          <p class="page-subtitle">Review item movement history and stock changes over time.</p>
        </div>
      </div>

      <div class="section form-grid">
        <div>
          <label for="vendorSelect">Select Vendor</label>
          <select id="vendorSelect"></select>
        </div>
        <div>
          <label for="inventoryItemSelect">Select Inventory Item</label>
          <select id="inventoryItemSelect"></select>
        </div>
      </div>

      <div class="section">
        <h3>Movement History</h3>
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Delta</th>
              <th>Before</th>
              <th>After</th>
              <th>Reason</th>
              <th>Event Time</th>
            </tr>
          </thead>
          <tbody id="stockMovementsBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/guards.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/stock-movements.js"></script>
  <script src="js/portal.js"></script>
  <script src="js/vendor-scope.js"></script>
</body>
</html>
