<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orders</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div class="app-shell">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="topbar"><h2>Orders</h2></div>

    <div class="section">
      <label>Select Vendor</label>
      <select id="vendorSelect"></select>
    </div>

    <div class="board">
      <div class="board-column">
        <h3>Created</h3>
        <div id="createdOrders"></div>
      </div>
      <div class="board-column">
        <h3>Accepted</h3>
        <div id="acceptedOrders"></div>
      </div>
      <div class="board-column">
        <h3>Preparing</h3>
        <div id="preparingOrders"></div>
      </div>
      <div class="board-column">
        <h3>Ready</h3>
        <div id="readyOrders"></div>
      </div>
      <div class="board-column">
        <h3>Completed</h3>
        <div id="completedOrders"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/guards.js"></script>
<script src="js/layout.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
