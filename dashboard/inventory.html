<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app-shell">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="topbar"><h2>Inventory</h2></div>

    <div class="section">
      <label>Select Vendor</label>
      <select id="vendorSelect"></select>
    </div>

    <div class="section">
      <h3>Create Inventory Item</h3>
      <form id="inventoryForm" class="form-grid">
        <input id="itemCode" placeholder="Item Code" required>
        <input id="itemName" placeholder="Item Name" required>
        <input id="unit" placeholder="Unit (pcs/grams/ml)" required>
        <input id="currentQuantity" type="number" step="0.001" placeholder="Current Quantity">
        <input id="lowStockThreshold" type="number" step="0.001" placeholder="Low Stock Threshold">
        <input id="unitCost" type="number" step="0.01" placeholder="Unit Cost">
        <button class="btn-primary" type="submit">Create Inventory Item</button>
      </form>
    </div>

    <div class="section">
      <h3>Inventory Items</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Qty</th>
            <th>Threshold</th>
          </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/guards.js"></script>
<script src="js/layout.js"></script>
<script src="js/inventory.js"></script>
</body>
</html>
