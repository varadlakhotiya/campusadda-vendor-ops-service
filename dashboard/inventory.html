<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory - Vendor Ops</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div>
          <div class="page-kicker">CampusAdda Vendor Ops</div>
          <h2>Inventory</h2>
          <p class="page-subtitle">Create items, monitor low stock, and perform stock operations from one place.</p>
        </div>
      </div>

      <div class="section">
        <label for="vendorSelect">Select Vendor</label>
        <select id="vendorSelect"></select>
      </div>

      <div class="section">
        <h3>Create Inventory Item</h3>
        <form id="inventoryForm" class="form-grid">
          <input id="itemCode" placeholder="Item Code" required>
          <input id="itemName" placeholder="Item Name" required>
          <input id="unit" placeholder="Unit (kg / ltr / pcs / ml)" required>
          <input id="currentQuantity" type="number" step="0.001" placeholder="Current Quantity">
          <input id="lowStockThreshold" type="number" step="0.001" placeholder="Low Stock Threshold">
          <input id="unitCost" type="number" step="0.01" placeholder="Unit Cost">
          <button class="btn-primary" type="submit">Create Inventory Item</button>
        </form>
      </div>

      <div class="section">
        <h3>Stock Operations</h3>
        <div class="form-grid">
          <select id="inventoryOperationItemSelect"></select>
          <input id="operationQuantity" type="number" step="0.001" placeholder="Quantity for Stock In / Out">
          <input id="operationUnitCost" type="number" step="0.01" placeholder="Unit Cost (for Stock In)">
          <input id="adjustedQuantity" type="number" step="0.001" placeholder="Adjusted Final Quantity">
          <input id="operationReason" placeholder="Reason">
          <button id="stockInBtn" class="btn-primary" type="button">Stock In</button>
          <button id="stockOutBtn" class="btn-secondary" type="button">Stock Out</button>
          <button id="adjustStockBtn" class="btn-secondary" type="button">Adjust Stock</button>
        </div>
      </div>

      <div class="section">
        <h3>Low Stock Items</h3>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Current Qty</th>
              <th>Threshold</th>
            </tr>
          </thead>
          <tbody id="lowStockBody"></tbody>
        </table>
      </div>

      <div class="section">
        <h3>Inventory Items</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Code</th>
              <th>Name</th>
              <th>Qty</th>
              <th>Threshold</th>
              <th>Unit Cost</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/guards.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/portal.js"></script>
  <script src="js/vendor-scope.js"></script>
</body>
</html>
