<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu Items</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app-shell">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="topbar"><h2>Menu Items</h2></div>

    <div class="section">
      <label>Select Vendor</label>
      <select id="vendorSelect"></select>
    </div>

    <div class="section">
      <form id="menuItemForm" class="form-grid">
        <select id="categorySelect"></select>
        <input id="itemCode" placeholder="Item Code" required>
        <input id="itemName" placeholder="Item Name" required>
        <input id="price" type="number" step="0.01" placeholder="Price" required>
        <input id="costPrice" type="number" step="0.01" placeholder="Cost Price">
        <input id="prepTimeMinutes" type="number" placeholder="Prep Time Minutes">
        <input id="primaryImageUrl" placeholder="Primary Image URL">
        <select id="isVeg">
          <option value="true">Veg</option>
          <option value="false">Non Veg</option>
        </select>
        <button class="btn-primary" type="submit">Create Menu Item</button>
      </form>
    </div>

    <div class="section">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Price</th>
            <th>Available</th>
          </tr>
        </thead>
        <tbody id="menuItemsBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/guards.js"></script>
<script src="js/layout.js"></script>
<script src="js/menu-items.js"></script>
</body>
</html>
