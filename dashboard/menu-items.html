<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu Items - Vendor Ops</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div>
          <div class="page-kicker">CampusAdda Vendor Ops</div>
          <h2>Menu Items</h2>
          <p class="page-subtitle">Create and manage menu items with pricing, category and availability.</p>
        </div>
      </div>

      <div class="section">
        <label for="vendorSelect">Select Vendor</label>
        <select id="vendorSelect"></select>
      </div>

      <div class="section">
        <h3>Create Menu Item</h3>
        <form id="menuItemForm" class="form-grid">
          <select id="categorySelect"></select>
          <input id="itemCode" placeholder="Item Code" required>
          <input id="itemName" placeholder="Item Name" required>
          <input id="price" type="number" step="0.01" placeholder="Price" required>
          <input id="costPrice" type="number" step="0.01" placeholder="Cost Price">
          <input id="prepTimeMinutes" type="number" placeholder="Prep Time Minutes">
          <input id="primaryImageUrl" placeholder="Primary Image URL">
          <select id="isVeg">
            <option value="true">Veg</option>
            <option value="false">Non Veg</option>
          </select>
          <button class="btn-primary" type="submit">Create Menu Item</button>
        </form>
      </div>

      <div class="section">
        <h3>Menu Items</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Code</th>
              <th>Name</th>
              <th>Price</th>
              <th>Available</th>
            </tr>
          </thead>
          <tbody id="menuItemsBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/guards.js"></script>
  <script src="js/portal.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/menu-items.js"></script>
  <script src="js/vendor-scope.js"></script>
</body>
</html>
