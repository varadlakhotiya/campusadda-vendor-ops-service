<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu Categories</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app-shell">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="topbar"><h2>Menu Categories</h2></div>

    <div class="section">
      <label>Select Vendor</label>
      <select id="vendorSelect"></select>
    </div>

    <div class="section">
      <form id="categoryForm" class="form-grid">
        <input id="categoryName" placeholder="Category Name" required>
        <input id="displayOrder" type="number" placeholder="Display Order">
        <button class="btn-primary" type="submit">Add Category</button>
      </form>
    </div>

    <div class="section">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Order</th>
            <th>Active</th>
          </tr>
        </thead>
        <tbody id="categoryTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/guards.js"></script>
<script src="js/layout.js"></script>
<script src="js/menu-categories.js"></script>
</body>
</html>
