<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Vendor Ops</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="page-kicker">CampusAdda Vendor Ops</div>
      <h2>Welcome back</h2>
      <p class="page-subtitle">Sign in to manage vendors, menus, inventory, orders and alerts.</p>

      <form id="loginForm">
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div>
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div>
          <button class="btn-primary" type="submit">Login</button>
        </div>

        <div style="text-align:center;">
          <a href="signup.html">Restaurant owner? Request access</a>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/portal.js"></script>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        const payload = {
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value
        };

        Utils?.showMessage?.("Logging in...", "info");

        const response = await Api.post("/auth/login", payload);

        Auth.saveSession(response.data);

        if (typeof Portal !== "undefined" && Portal.clear) {
          Portal.clear();
        }

        const ctxResponse = await Api.get("/portal/context");
        const ctx = ctxResponse.data;

        if (ctx.adminUser || ctx.vendorUser) {
          window.location.href = "dashboard.html";
        } else {
          Utils?.showMessage?.("Your account does not have portal access.", "error");
        }
      } catch (err) {
        alert(err.message || "Login failed");
      }
    });
  </script>
</body>
</html>
