<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vendor Signup Requests - Vendor Ops</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div>
          <div class="page-kicker">CampusAdda Vendor Ops</div>
          <h2>Vendor Signup Requests</h2>
          <p class="page-subtitle">Approve or reject restaurant access requests from the admin panel.</p>
        </div>
      </div>

      <div class="section">
        <h3>Pending Requests</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Restaurant</th>
              <th>Contact</th>
              <th>Email</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="signupRequestsBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/guards.js"></script>
  <script src="js/portal.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/vendor-signup-requests.js"></script>
</body>
</html>
