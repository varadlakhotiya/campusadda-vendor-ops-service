name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run tests
        run: mvn clean test

      - name: Build jar
        run: mvn clean package -DskipTests

  ml-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Import smoke test
        run: |
          python -c "from app.main import app; print('ML service import ok')"

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, ml-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t campusadda-backend ./backend

      - name: Build ml image
        run: docker build -t campusadda-ml ./ml-service

      - name: Build dashboard image
        run: docker build -t campusadda-dashboard ./dashboard